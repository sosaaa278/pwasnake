<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Tetris PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

</head>

<body>
    <script src="https://js.stripe.com/v3/"></script>

    <button id="pay-button">Pagar MXN</button>

    <canvas id="tetris" width="240" height="400"></canvas>

    <div class="controls">
        <button id="rotate">⟳</button>
        <button id="left">◀</button>
        <button id="down">▼</button>
        <button id="right">▶</button>
        <button id="pause">⏸</button>
    </div>



    <form id="payment-form" style="display:none;">
        <div id="payment-element"></div>
        <button id="submit">Confirmar pago</button>
        <div id="error-message"></div>
    </form>

    <script>



        document.getElementById("pay-button").addEventListener("click", async () => {
            console.log("Creating payment intent...");


            const response = await fetch("https://pwasnake.vercel.app/api/create-payment-intent", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    amount: 1000
                })
            });

            const { clientSecret } = await response.json();

            const stripe = Stripe("pk_live_51T6nIZCqEjyCj47LlHjhasn2pvnAWwXVoID23kSQ8VkZpkdEPIx8Jhatdww7HLseDLltAjtnPi2RNGHu0gsO109Z00usVF3Xfg");

            console.log(clientSecret);

            const elements = stripe.elements({ clientSecret });


            document.getElementById("payment-form").style.display = "block";

            const paymentElement = elements.create("payment");
            paymentElement.mount("#payment-element");
        });

        document.getElementById("payment-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const { error } = await stripe.confirmPayment({
                elements, // 🔥 ahora sí existe
                redirect: "if_required"
            });

            if (error) {
                document.getElementById("error-message").textContent = error.message;
            } else {
                alert("Pago exitoso ✅");
                location.reload();
            }
        });
    </script>





    <script src="https://cdn.botpress.cloud/desk/webchat/v4.0/inject.js" defer></script>
    <script src="https://files.bpcontent.cloud/2026/03/06/07/20260306073400-T3BXF2TA.js" defer></script>


    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <script src="game.js"></script>
</body>

</html>
